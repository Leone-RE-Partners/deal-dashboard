<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leone Pipeline</title>
<!-- BUILD-v10-EMAILGUARD renderFeed-null-safe -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F1F2EC; --surface:#FFFFFF; --surface-2:#FAFAF7;
    --ink:#19212E; --ink-soft:#5C6573; --ink-faint:#939BA6;
    --line:#E4E5DE; --line-soft:#EEEEE8;
    --teal:#1C7D6D; --teal-deep:#13594D; --teal-wash:#E7F1EE;
    --slate:#6B7686; --blue:#4E73A8; --amber:#BC7E33; --amber-wash:#F6ECDC;
    --green:#2E8B57; --rust:#A8483B; --rust-wash:#F3E5E2;
    --flame:#D2542F; --flame-wash:#FAE7DF;
    --shadow:0 1px 2px rgba(25,33,46,.04),0 4px 16px rgba(25,33,46,.06);
    --shadow-lg:0 8px 40px rgba(25,33,46,.16);
    --r:10px; --r-sm:7px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--paper);color:var(--ink);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;font-feature-settings:'tnum' 1}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  ::selection{background:var(--teal);color:#fff}

  header{position:sticky;top:0;z-index:40;background:rgba(241,242,236,.86);backdrop-filter:saturate(1.4) blur(12px);border-bottom:1px solid var(--line)}
  .bar{display:flex;align-items:center;gap:20px;padding:0 22px;height:60px;max-width:1500px;margin:0 auto}
  .brand{display:flex;align-items:baseline;gap:9px;flex-shrink:0}
  .brand .mark{font-family:'Fraunces',serif;font-weight:600;font-size:21px;letter-spacing:-.02em}
  .brand .mark em{font-style:italic;color:var(--teal)}
  .brand .tag{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);font-weight:600}

  .views{display:flex;background:var(--surface-2);border:1px solid var(--line);border-radius:9px;padding:3px;gap:2px}
  .views button{padding:6px 14px;font-size:13px;font-weight:500;border-radius:6px;color:var(--ink-soft);display:flex;align-items:center;gap:7px;transition:.15s}
  .views button .ic{width:15px;height:15px}
  .views button:hover{color:var(--ink)}
  .views button.on{background:var(--surface);color:var(--ink);box-shadow:0 1px 2px rgba(25,33,46,.07);font-weight:600}

  .search{margin-left:auto;position:relative;display:flex;align-items:center}
  .search svg{position:absolute;left:11px;width:15px;height:15px;color:var(--ink-faint);pointer-events:none}
  .search input{width:200px;padding:8px 12px 8px 33px;border:1px solid var(--line);border-radius:8px;background:var(--surface);font-size:13px;color:var(--ink);transition:.15s}
  .search input:focus{outline:none;border-color:var(--teal);width:240px;box-shadow:0 0 0 3px var(--teal-wash)}
  .search input::placeholder{color:var(--ink-faint)}
  .attn{display:flex;align-items:center;gap:8px;padding:7px 13px;border-radius:8px;background:var(--amber-wash);border:1px solid #EAD9BC;color:#86591D;font-weight:600;font-size:13px;transition:.15s}
  .attn:hover{background:#F2E6CF}
  .attn .dot{width:7px;height:7px;border-radius:50%;background:var(--amber)}

  main{max-width:1500px;margin:0 auto;padding:26px 22px 80px}
  .eyebrow{font-size:11px;letter-spacing:.13em;text-transform:uppercase;color:var(--ink-faint);font-weight:600}
  h1.page{font-family:'Fraunces',serif;font-weight:600;font-size:27px;letter-spacing:-.02em;margin:5px 0 2px}
  .sub{color:var(--ink-soft);font-size:14px;margin-bottom:24px;max-width:680px}

  .feed-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  @media(max-width:980px){.feed-grid{grid-template-columns:1fr}}
  .panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
  .panel.span{grid-column:1/-1}
  .panel-head{display:flex;align-items:center;gap:10px;padding:15px 18px 13px;border-bottom:1px solid var(--line-soft)}
  .panel-head .ph-ic{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;flex-shrink:0}
  .panel-head h2{font-size:14.5px;font-weight:600;letter-spacing:-.01em}
  .panel-head .count{margin-left:auto;font-size:12px;font-weight:600;color:var(--ink-soft);background:var(--surface-2);border:1px solid var(--line);padding:2px 9px;border-radius:20px}
  .panel-body{padding:7px}
  .empty{padding:24px 18px;text-align:center;color:var(--ink-faint);font-size:13px}

  .row{display:flex;align-items:center;gap:13px;padding:11px 12px;border-radius:8px;cursor:pointer;transition:background .12s;position:relative}
  .row:hover{background:var(--surface-2)}
  .row + .row{border-top:1px solid var(--line-soft)}
  .row .age{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;width:42px;flex-shrink:0;text-align:right}
  .row .rmain{min-width:0;flex:1}
  .row .rname{font-weight:600;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:7px}
  .row .rmeta{font-size:12px;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
  .row .rtag{flex-shrink:0}
  .heat{width:8px;height:8px;border-radius:50%;flex-shrink:0}

  .stage-chip{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;white-space:nowrap;display:inline-flex;align-items:center;gap:5px}
  .stage-chip .sd{width:6px;height:6px;border-radius:50%}
  .avatar{width:25px;height:25px;border-radius:50%;display:grid;place-items:center;font-size:11px;font-weight:600;color:#fff;flex-shrink:0;letter-spacing:-.02em}
  .avatar.sm{width:21px;height:21px;font-size:10px}
  .avatar.empty{background:var(--surface-2)!important;border:1.5px dashed var(--line);color:var(--ink-faint)}

  .fix-tag{font-size:10.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:3px 8px;border-radius:6px}
  .fix-review{background:var(--amber-wash);color:#86591D}
  .fix-triage{background:#ECEEF1;color:#5C6573}

  /* flame priority marker */
  .flame{display:inline-flex;align-items:center;gap:3px;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;color:var(--flame)}
  .flame svg{width:12px;height:12px}
  .rank-badge{font-family:'Fraunces',serif;font-weight:600;font-size:15px;width:30px;text-align:center;flex-shrink:0;color:var(--flame)}

  /* source chip */
  .src{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;color:var(--ink-soft)}
  .src svg{width:12px;height:12px;flex-shrink:0;color:var(--ink-faint)}
  .src.unknown{color:var(--amber)}

  /* Board */
  .board{display:flex;gap:14px;overflow-x:auto;padding-bottom:14px;align-items:flex-start}
  .col{flex:1;min-width:236px;background:rgba(255,255,255,.5);border:1px solid var(--line);border-radius:var(--r)}
  .col.drag-over{background:var(--teal-wash);border-color:var(--teal)}
  .col-head{display:flex;align-items:center;gap:8px;padding:13px 14px 11px}
  .col-head .sd{width:9px;height:9px;border-radius:50%}
  .col-head .cl{font-weight:600;font-size:13px}
  .col-head .cc{margin-left:auto;font-size:12px;color:var(--ink-faint);font-weight:600;font-family:'IBM Plex Mono',monospace}
  .col-body{padding:0 8px 10px;display:flex;flex-direction:column;gap:8px;min-height:40px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:9px;padding:12px;cursor:grab;box-shadow:0 1px 2px rgba(25,33,46,.05);transition:box-shadow .14s,transform .14s,border-color .14s}
  .card:hover{box-shadow:var(--shadow);border-color:#D4D6CD;transform:translateY(-1px)}
  .card:active{cursor:grabbing}
  .card.dragging{opacity:.45}
  .card .cname{font-weight:600;font-size:13.5px;line-height:1.3;margin-bottom:7px;display:flex;align-items:center;gap:6px}
  .card .cmeta{display:flex;align-items:center;gap:7px;font-size:11.5px;color:var(--ink-soft);font-family:'IBM Plex Mono',monospace}
  .card .crow{display:flex;align-items:center;gap:6px;margin-top:10px}
  .card .cbroker{font-size:11.5px;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
  .card .quiet{font-size:10.5px;font-weight:600;font-family:'IBM Plex Mono',monospace;display:flex;align-items:center;gap:5px}

  .killbar{margin-top:18px;border:1px solid var(--line);border-radius:var(--r);background:rgba(255,255,255,.4);overflow:hidden}
  .killbar-head{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer}
  .killbar-head .sd{width:9px;height:9px;border-radius:2px;background:var(--rust)}
  .killbar-head h3{font-size:13px;font-weight:600}
  .killbar-head .cc{margin-left:auto;font-size:12px;color:var(--ink-faint);font-weight:600;font-family:'IBM Plex Mono',monospace}
  .killbar-head .chev{transition:transform .2s;color:var(--ink-faint)}
  .killbar.open .chev{transform:rotate(180deg)}
  .killbar-body{display:none;padding:4px 12px 14px;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:9px}
  .killbar.open .killbar-body{display:grid}
  .kcard{border:1px solid var(--line-soft);border-radius:9px;padding:11px 12px;background:var(--surface-2);cursor:pointer;transition:.14s}
  .kcard:hover{background:var(--surface);box-shadow:var(--shadow)}
  .kcard .kname{font-weight:600;font-size:13px;text-decoration:line-through;text-decoration-color:var(--rust);text-decoration-thickness:1.5px;color:var(--ink-soft)}
  .kcard .kreason{font-size:11.5px;color:var(--ink-soft);margin-top:5px;line-height:1.4}

  /* Priority view */
  .pri-wrap{display:grid;grid-template-columns:1fr 300px;gap:18px;align-items:start}
  @media(max-width:980px){.pri-wrap{grid-template-columns:1fr}}
  .pri-list{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
  .pri-item{display:flex;align-items:center;gap:13px;padding:13px 15px;border-bottom:1px solid var(--line-soft);cursor:grab;transition:background .12s;background:var(--surface)}
  .pri-item:hover{background:var(--surface-2)}
  .pri-item:last-child{border-bottom:none}
  .pri-item.dragging{opacity:.4}
  .pri-item.drag-over-top{box-shadow:inset 0 2px 0 var(--flame)}
  .pri-grip{color:var(--ink-faint);flex-shrink:0;cursor:grab}
  .pri-main{flex:1;min-width:0}
  .pri-name{font-weight:600;font-size:14px;display:flex;align-items:center;gap:8px}
  .pri-by{font-size:11.5px;color:var(--ink-faint);margin-top:2px;font-family:'IBM Plex Mono',monospace}
  .pri-remove{opacity:0;color:var(--ink-faint);width:26px;height:26px;border-radius:6px;display:grid;place-items:center;transition:.13s;flex-shrink:0}
  .pri-item:hover .pri-remove{opacity:1}
  .pri-remove:hover{background:var(--rust-wash);color:var(--rust)}
  .pri-tray{background:rgba(255,255,255,.5);border:1px solid var(--line);border-radius:var(--r);padding:7px}
  .tray-head{padding:10px 11px 8px;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);font-weight:600}
  .tray-item{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:8px;cursor:pointer;transition:.12s;font-size:13px;font-weight:500}
  .tray-item:hover{background:var(--surface)}
  .tray-item .plus{margin-left:auto;color:var(--flame);font-weight:700;font-size:16px;opacity:0;transition:.12s}
  .tray-item:hover .plus{opacity:1}

  /* Table */
  .tbl-wrap{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
  table{width:100%;border-collapse:collapse}
  thead th{text-align:left;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-faint);font-weight:600;padding:12px 14px;border-bottom:1px solid var(--line);cursor:pointer;white-space:nowrap;user-select:none}
  thead th:hover{color:var(--ink-soft)}
  thead th .ar{font-size:9px;margin-left:3px;opacity:.6}
  tbody td{padding:11px 14px;border-bottom:1px solid var(--line-soft);font-size:13px;white-space:nowrap}
  tbody tr{cursor:pointer;transition:background .1s}
  tbody tr:hover{background:var(--surface-2)}
  tbody tr:last-child td{border-bottom:none}
  td.num{font-family:'IBM Plex Mono',monospace;text-align:right}
  td .tname{font-weight:600;display:flex;align-items:center;gap:7px}
  .killed-row td .tname{text-decoration:line-through;text-decoration-color:var(--rust);color:var(--ink-soft)}

  /* Drawer */
  .scrim{position:fixed;inset:0;background:rgba(25,33,46,.32);z-index:50;opacity:0;pointer-events:none;transition:opacity .2s}
  .scrim.show{opacity:1;pointer-events:auto}
  .drawer{position:fixed;top:0;right:0;height:100%;width:min(560px,94vw);background:var(--paper);z-index:60;box-shadow:var(--shadow-lg);transform:translateX(100%);transition:transform .26s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
  .drawer.show{transform:translateX(0)}
  .d-head{padding:20px 22px 16px;border-bottom:1px solid var(--line);background:var(--surface)}
  .d-top{display:flex;align-items:flex-start;gap:12px}
  .d-name{font-family:'Fraunces',serif;font-weight:600;font-size:21px;letter-spacing:-.02em;line-height:1.2;flex:1}
  .killed .d-name{text-decoration:line-through;text-decoration-color:var(--rust);color:var(--ink-soft)}
  .d-close{width:30px;height:30px;border-radius:7px;display:grid;place-items:center;color:var(--ink-soft);flex-shrink:0;transition:.14s}
  .d-close:hover{background:var(--surface-2);color:var(--ink)}
  .d-figs{display:flex;flex-wrap:wrap;gap:7px;margin-top:13px}
  .fig{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:500;background:var(--surface-2);border:1px solid var(--line);border-radius:7px;padding:4px 9px;color:var(--ink-soft)}
  .fig b{color:var(--ink);font-weight:600}

  .d-body{flex:1;overflow-y:auto;padding:18px 22px 40px}
  .d-sec{margin-bottom:22px}
  .d-sec > .lbl{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:8px}
  .d-sec > .lbl .ln{flex:1;height:1px;background:var(--line)}

  .stage-track{display:flex;gap:4px}
  .st{flex:1;text-align:center;padding:8px 4px;border-radius:7px;font-size:11px;font-weight:600;background:var(--surface-2);border:1px solid var(--line);color:var(--ink-faint);cursor:pointer;transition:.13s;line-height:1.2}
  .st:hover{border-color:var(--ink-faint)}
  .st.done{color:#fff}
  .st .stn{display:block;font-family:'IBM Plex Mono',monospace;font-size:10px;opacity:.7;margin-bottom:2px}

  .assign-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .person-pick{display:flex;align-items:center;gap:6px;padding:6px 11px 6px 7px;border:1px solid var(--line);border-radius:30px;background:var(--surface);font-size:13px;font-weight:500;transition:.14s}
  .person-pick:hover{border-color:var(--ink-faint);background:var(--surface-2)}
  .person-pick.on{border-color:var(--teal);background:var(--teal-wash);color:var(--teal-deep)}

  .mail{padding:13px;border:1px solid var(--line);border-radius:9px;background:var(--surface);margin-bottom:8px}
  .mail-top{display:flex;align-items:center;gap:9px;margin-bottom:5px;flex-wrap:wrap}
  .mail-from{font-weight:600;font-size:13px}
  .mail-date{margin-left:auto;font-size:11px;color:var(--ink-faint);font-family:'IBM Plex Mono',monospace}
  .mail-subj{font-size:12.5px;color:var(--ink);font-weight:500;margin-bottom:3px}
  .mail-snip{font-size:12.5px;color:var(--ink-soft);line-height:1.5}
  .mtag{font-size:9.5px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;padding:2px 6px;border-radius:5px}
  .mtag.auto{background:var(--teal-wash);color:var(--teal-deep)}
  .mtag.thread{background:#E9EFF6;color:var(--blue)}
  .mtag.review{background:var(--amber-wash);color:#86591D}
  .inbox-chip{font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--ink-faint);background:var(--surface-2);border:1px solid var(--line);padding:1px 6px;border-radius:5px}

  .note{padding:12px 13px;border-radius:9px;margin-bottom:8px;border:1px solid var(--line);transition:.15s}
  .note.me{background:var(--teal-wash);border-color:#CFE5DF}
  .note.them{background:#FBF3E4;border-color:#EEDFC4}
  .note.done{opacity:.55;background:var(--surface-2);border-color:var(--line)}
  .note.done .note-text{text-decoration:line-through;color:var(--ink-soft)}
  .note-top{display:flex;align-items:center;gap:8px;margin-bottom:5px}
  .note-who{font-weight:600;font-size:12.5px}
  .note-date{font-size:11px;color:var(--ink-faint);font-family:'IBM Plex Mono',monospace}
  .note-check{margin-left:auto;width:21px;height:21px;border-radius:6px;border:1.5px solid var(--line);display:grid;place-items:center;cursor:pointer;transition:.13s;flex-shrink:0;color:transparent}
  .note-check:hover{border-color:var(--teal)}
  .note.done .note-check{background:var(--teal);border-color:var(--teal);color:#fff}
  .note-text{font-size:13px;line-height:1.5;color:var(--ink)}
  .note-add{display:flex;gap:8px;margin-top:4px}
  .note-add textarea{flex:1;border:1px solid var(--line);border-radius:9px;padding:10px 12px;font-family:inherit;font-size:13px;resize:none;background:var(--surface);min-height:38px;line-height:1.4;color:var(--ink)}
  .note-add textarea:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-wash)}

  .btn{padding:9px 15px;border-radius:8px;font-size:13px;font-weight:600;transition:.14s;display:inline-flex;align-items:center;gap:7px;white-space:nowrap}
  .btn-primary{background:var(--teal);color:#fff}
  .btn-primary:hover{background:var(--teal-deep)}
  .btn-ghost{background:var(--surface);border:1px solid var(--line);color:var(--ink-soft)}
  .btn-ghost:hover{border-color:var(--ink-faint);color:var(--ink)}
  .btn-danger{background:var(--surface);border:1px solid #E4C9C4;color:var(--rust)}
  .btn-danger:hover{background:var(--rust-wash)}
  .btn-flame{background:var(--flame-wash);border:1px solid #EBC9BC;color:var(--flame)}
  .btn-flame:hover{background:#F5DDD2}

  .d-foot{padding:14px 22px;border-top:1px solid var(--line);background:var(--surface);display:flex;gap:9px;align-items:center}
  .killnote{background:var(--rust-wash);border:1px solid #E8CFC9;border-radius:9px;padding:12px 14px;font-size:13px;color:#7A332A;line-height:1.5}
  .killnote b{font-weight:600}

  .modal-scrim{position:fixed;inset:0;background:rgba(25,33,46,.4);z-index:80;display:none;place-items:center;padding:20px}
  .modal-scrim.show{display:grid}
  .modal{background:var(--surface);border-radius:14px;box-shadow:var(--shadow-lg);width:min(440px,100%);overflow:hidden}
  .modal h3{font-family:'Fraunces',serif;font-size:19px;font-weight:600;padding:20px 22px 4px}
  .modal p{padding:0 22px;color:var(--ink-soft);font-size:13.5px}
  .modal .reasons{padding:16px 22px 6px;display:flex;flex-direction:column;gap:7px}
  .reason-opt{text-align:left;padding:11px 13px;border:1px solid var(--line);border-radius:9px;font-size:13px;transition:.13s;background:var(--surface)}
  .reason-opt:hover{border-color:var(--rust);background:var(--rust-wash)}
  .modal textarea{width:calc(100% - 44px);margin:0 22px;border:1px solid var(--line);border-radius:9px;padding:10px 12px;font-family:inherit;font-size:13px;resize:none;min-height:54px}
  .modal textarea:focus{outline:none;border-color:var(--teal)}
  .modal-foot{display:flex;gap:9px;justify-content:flex-end;padding:16px 22px 20px}

  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;font-weight:500;z-index:90;box-shadow:var(--shadow-lg);transition:transform .3s cubic-bezier(.4,0,.2,1);display:flex;align-items:center;gap:9px}
  .toast.show{transform:translateX(-50%) translateY(0)}


  /* Pipeline view */
  .pp-wrap{overflow:auto;border:1px solid var(--line);border-radius:var(--r);background:var(--surface);box-shadow:var(--shadow);max-height:74vh}
  .pp-table{border-collapse:separate;border-spacing:0;white-space:nowrap;font-size:12.5px}
  .pp-table thead th{position:sticky;top:0;z-index:3;background:var(--surface-2);border-bottom:1px solid var(--line);border-right:1px solid var(--line-soft);padding:9px 11px;font-size:10.5px;letter-spacing:.03em;text-transform:uppercase;color:var(--ink-faint);font-weight:600;text-align:left}
  .pp-table tbody td{padding:8px 11px;border-bottom:1px solid var(--line-soft);border-right:1px solid var(--line-soft);color:var(--ink-soft)}
  .pp-table tbody td.num{font-family:'IBM Plex Mono',monospace;text-align:right;color:var(--ink)}
  .pp-table tbody tr{cursor:pointer}
  .pp-table tbody tr:hover td{background:var(--surface-2)}
  .pp-num{font-family:'IBM Plex Mono',monospace;color:var(--ink-faint);text-align:right;width:40px;position:sticky;left:0;background:var(--surface);z-index:2}
  .pp-table thead th:first-child{position:sticky;left:0;z-index:4;background:var(--surface-2)}
  .pp-sticky{position:sticky;left:40px;z-index:2;background:var(--surface);min-width:175px}
  .pp-table thead th.pp-sticky{z-index:4;background:var(--surface-2)}
  .pp-name{font-weight:600;color:var(--ink)!important}
  .killed-row .pp-name{text-decoration:line-through;text-decoration-color:var(--rust);color:var(--ink-soft)!important}
  .pp-table tbody tr:hover td.pp-num,.pp-table tbody tr:hover td.pp-sticky{background:var(--surface-2)}
  .pp-stat{font-size:10px;font-weight:700;text-transform:uppercase;padding:2px 7px;border-radius:5px;margin-right:6px}
  .pp-stat.dead{background:var(--rust-wash);color:var(--rust)}
  .pp-stat.live{background:var(--teal-wash);color:var(--teal-deep)}
  .pp-kill{font-size:11px;font-weight:600;color:var(--ink-faint);padding:2px 8px;border:1px solid var(--line);border-radius:5px;transition:.13s}
  .pp-kill:hover{border-color:var(--rust);color:var(--rust);background:var(--rust-wash)}
  /* Underwriting detail grid */
  .uw-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);border:1px solid var(--line);border-radius:9px;overflow:hidden}
  @media(max-width:520px){.uw-grid{grid-template-columns:1fr}}
  .uw-cell{background:var(--surface);padding:8px 11px;min-width:0}
  .uw-l{font-size:10px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.03em;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .uw-v{font-size:13px;font-weight:600;font-family:'IBM Plex Mono',monospace;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  /* Broker contact log */
  .log-input{width:100%;border:1px solid var(--line);border-radius:9px;padding:10px 12px;font-family:inherit;font-size:13px;resize:none;background:var(--surface);line-height:1.4;color:var(--ink)}
  .log-input:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-wash)}
  .log-btns{display:flex;gap:8px;margin-top:9px}
  .log-btns .btn{padding:8px 13px}
  .log-entry{padding:11px 13px;border:1px solid var(--line);border-radius:9px;margin-bottom:8px;background:var(--surface)}
  .log-entry.call{border-left:3px solid var(--teal)}
  .log-entry.text{border-left:3px solid var(--blue)}
  .log-entry.note{border-left:3px solid var(--amber)}
  .log-entry.email{border-left:3px solid var(--slate)}
  .log-top{display:flex;align-items:center;gap:8px;margin-bottom:4px}
  .log-type{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:2px 7px;border-radius:5px}
  .log-type.call{background:var(--teal-wash);color:var(--teal-deep)}
  .log-type.text{background:#E9EFF6;color:var(--blue)}
  .log-type.note{background:var(--amber-wash);color:#86591D}
  .log-type.email{background:var(--surface-2);color:var(--ink-soft)}
  .log-by{font-weight:600;font-size:12.5px}
  .log-date{margin-left:auto;font-size:11px;color:var(--ink-faint);font-family:'IBM Plex Mono',monospace}
  .log-text{font-size:13px;line-height:1.5;color:var(--ink)}
  /* Attachments */
  .dropzone{display:flex;align-items:center;gap:10px;padding:13px;border:1.5px dashed var(--line);border-radius:9px;color:var(--ink-soft);font-size:13px;cursor:pointer;transition:.14s;background:var(--surface-2)}
  .dropzone:hover{border-color:var(--teal);color:var(--teal-deep);background:var(--teal-wash)}
  .file-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border:1px solid var(--line);border-radius:9px;background:var(--surface);margin-bottom:7px}
  .file-ic{width:34px;height:34px;border-radius:7px;display:grid;place-items:center;font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:700;flex-shrink:0;color:#fff;background:var(--slate)}
  .file-ic.pdf{background:#B0473B}.file-ic.xlsx{background:#2E8B57}.file-ic.t12{background:#1C7D6D}.file-ic.om{background:#4E73A8}.file-ic.rr{background:#BC7E33}.file-ic.img{background:#6B5B95}
  .file-name{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .file-meta{font-size:11px;color:var(--ink-faint);font-family:'IBM Plex Mono',monospace;margin-top:1px}
  .file-del{width:26px;height:26px;border-radius:6px;display:grid;place-items:center;color:var(--ink-faint);flex-shrink:0;transition:.13s}
  .file-del:hover{background:var(--rust-wash);color:var(--rust)}

  @media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
  .fade-in{animation:fade .35s ease both}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
</style>

(function importPipe(){
  const curatedByName={}; DEALS.forEach(d=>curatedByName[d.name.toLowerCase().trim()]=d);
  PIPE.rows.forEach(r=>{
    const v=r.v, name=String(v[PI.name]||'').trim(); if(!name) return;
    const low=(String(v[PI.status]||'').trim()).toLowerCase();
    const dead= low==='dead'||low.includes('covid'); const bought= low==='bought';
    const bn=String(v[PI.bn]||'').trim(), bc=String(v[PI.bc]||'').trim(), uw=String(v[PI.uw]||'').trim();
    const units=parseInt(v[PI.units])||0, year=parseInt(v[PI.year])||0;
    let cap=parseFloat(v[PI.cap]); if(!cap||isNaN(cap)) cap=parseFloat(v[PI.uwcap]); cap=(cap&&Math.abs(cap)<1.5)?cap*100:(cap||0);
    const existing=curatedByName[name.toLowerCase()];
    if(existing){ existing.pipeVals=v; existing.pn=r.n; existing.fund=String(v[PI.fund]||'').trim(); existing.uw=uw;
      if(!existing.units) existing.units=units; if(!existing.year) existing.year=year; if(!existing.cap&&cap) existing.cap=+cap.toFixed(2); return; }
    const d={ id:'p'+r.n, name, acls:'multifamily', units, address:String(v[PI.addr]||'').trim(),
      year, cap: cap?+cap.toFixed(2):0, broker:bn, firm:bc,
      source: bn?null:(bc?{label:bc,kind:'firm'}:{label:'Source unidentified',kind:'unknown'}),
      stage: bought?5:1, assignee: UWMAP[uw]||'', last: bought?'2026-03-06':'2025-09-15', review:false,
      pipeVals:v, pn:r.n, fund:String(v[PI.fund]||'').trim(), uw,

    if(dead){ d.killed=true; d.killReason= low.includes('covid')?'Covid, taken off market.':'Marked dead in the acquisition pipeline.'; d.killedBy=UWMAP[uw]||'Team'; d.killedDate='2025-10-01'; }

  });

function daysSince(dstr){ return Math.round((TODAY - new Date(dstr))/86400000); }
function heatColor(days){ if(days>=14) return 'var(--rust)'; if(days>=7) return 'var(--amber)'; return 'var(--teal)'; }
function fmtDate(d){ return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric'}); }
function fmtUnits(d){ return d.units? d.units+' units' : (d.acls==='retail'?'NNN retail':'—'); }
function reviewItems(){ return live().filter(d=>d.review); }
function quietItems(){ return live().filter(d=>!d.review && daysSince(d.last)>=7).sort((a,b)=>daysSince(b.last)-daysSince(a.last)); }
function attnTotal(){ return reviewItems().length + TRIAGE.filter(t=>t.looksReal).length; }
function rankOf(id){ const i=RANK.indexOf(id); return i<0?null:i+1; }
function matchQ(d){ const q=state.q.toLowerCase(); if(!q) return true; return (d.name+' '+d.broker+' '+d.firm+' '+(d.source?d.source.label:'')+' '+d.address+' '+d.acls).toLowerCase().includes(q); }

function avatar(name,cls=''){ if(!name) return `<div class="avatar empty ${cls}" title="Unassigned">+</div>`;
  return `<div class="avatar ${cls}" style="background:${(PEOPLE[name]||{}).c||'#888'}" title="${name}">${initials(name)}</div>`; }
function stageChip(id){ const s=stageMeta(id); return `<span class="stage-chip" style="background:${s.tint}14;color:${s.tint}"><span class="sd" style="background:${s.tint}"></span>${s.label}</span>`; }
function flameFor(id){ const r=rankOf(id); if(!r||r>3) return ''; return `<span class="flame" title="Priority #${r}"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 1c1.6 2.3 3.2 3.4 3.2 5.6A3.2 3.2 0 018 9.8a3.2 3.2 0 01-3.2-3.2c0-1 .5-1.9 1-2.6C7 5 8 4 8 1z"/></svg>${r}</span>`; }

// source line: broker if known, else the parsed source
function sourceLine(d, withIcon=true){
  if(d.broker) return `${d.broker} · ${d.firm}`;
  const s = d.source || {label:'Source unidentified',kind:'unknown'};
  const ic = s.kind==='unknown'
    ? `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="8" cy="8" r="6"/><path d="M8 5.5v3M8 11h.01"/></svg>`
    : `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M2 6l6-3 6 3-6 3-6-3z"/><path d="M4 8v3c0 1 4 2 4 2s4-1 4-2V8"/></svg>`;
  return `<span class="src ${s.kind==='unknown'?'unknown':''}">${withIcon?ic:''}${s.label}${s.sub?` · ${s.sub}`:''}</span>`;
}
function shortSource(d){
  if(d.broker) return d.broker;
  const s=d.source||{label:'Unidentified'}; return s.label;
}

function render(){
  document.querySelectorAll('#views button').forEach(b=>b.classList.toggle('on',b.dataset.view===state.view));
  $('#attnCount').textContent = attnTotal();
  const m = $('#main');
  if(state.view==='feed') m.innerHTML = renderFeed();
  else if(state.view==='priority') m.innerHTML = renderPriority();
  else if(state.view==='board') m.innerHTML = renderBoard();
  else if(state.view==='pipeline') m.innerHTML = renderPipeView();
  else if(state.view==='brokers') m.innerHTML = renderBrokers();
  else m.innerHTML = renderTable();
  wireMain();
}

/* Feed */
function renderFeed(){
  const rev = reviewItems(), quiet = quietItems();
  const triageReal = TRIAGE.filter(t=>t.looksReal), triageNoise = TRIAGE.filter(t=>!t.looksReal);
  const topPri = RANK.slice(0,3).map(dealById).filter(d=>d&&!d.killed);
  const recent = [...live()].sort((a,b)=> new Date(b.last)-new Date(a.last)).slice(0,6);

  const priRows = topPri.map((d,i)=>`<div class="row" data-deal="${d.id}">
      <div class="rank-badge">${i+1}</div>
      <div class="rmain"><div class="rname">${d.name} ${flameFor(d.id)}</div>
        <div class="rmeta">${shortSource(d)} · set by ${(RANKMETA[d.id]||{}).by||'—'}</div></div>
      <div class="rtag">${stageChip(d.stage)}</div>${avatar(d.assignee,'sm')}
    </div>`).join('') || `<div class="empty">No deals ranked yet. Open Priority to set the order.</div>`;

  const needRows = [...rev.map(d=>feedRow(d,'review')), ...triageReal.map(t=>triageRow(t))].join('')
    || `<div class="empty">Nothing waiting on you. The classifier handled it all.</div>`;
  const quietRows = quiet.length ? quiet.map(d=>feedRow(d,'quiet')).join('') : `<div class="empty">No deals have gone quiet. Everything is moving.</div>`;
  const recentRows = recent.map(d=>`<div class="row" data-deal="${d.id}">
      <div class="heat" style="background:${heatColor(daysSince(d.last))}"></div>
      <div class="rmain"><div class="rname">${d.name} ${flameFor(d.id)}</div>
        <div class="rmeta">${(d.emails&&d.emails.length)?(d.emails[d.emails.length-1].from+' · '+d.emails[d.emails.length-1].subj):shortSource(d)}</div></div>
      <div class="rtag">${stageChip(d.stage)}</div>${avatar(d.assignee,'sm')}</div>`).join('');

  return `<div class="fade-in">
    <div class="eyebrow">Tuesday · June 24</div>
    <h1 class="page">What needs you</h1>
    <div class="sub">The pipeline sorts itself. This is only what it could not decide, what the team flagged urgent, and what is slipping.</div>
    <div class="feed-grid">
      <div class="panel span">
        <div class="panel-head"><div class="ph-ic" style="background:var(--flame-wash)">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="var(--flame)"><path d="M8 1c1.6 2.3 3.2 3.4 3.2 5.6A3.2 3.2 0 018 9.8a3.2 3.2 0 01-3.2-3.2c0-1 .5-1.9 1-2.6C7 5 8 4 8 1z"/></svg></div>
          <h2>Top of the list</h2><span class="count">team priority</span></div>
        <div class="panel-body">${priRows}</div>
      </div>
      <div class="panel">
        <div class="panel-head"><div class="ph-ic" style="background:var(--amber-wash)">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="#BC7E33" stroke-width="1.7"><path d="M8 1.5L1.5 13h13L8 1.5z"/><path d="M8 6.5v3M8 11.2v.2"/></svg></div>
          <h2>Needs a decision</h2><span class="count">${rev.length+triageReal.length}</span></div>
        <div class="panel-body">${needRows}</div>
      </div>
      <div class="panel">
        <div class="panel-head"><div class="ph-ic" style="background:var(--rust-wash)">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="#A8483B" stroke-width="1.7"><circle cx="8" cy="8" r="6"/><path d="M8 5v3.2l2 1.2"/></svg></div>
          <h2>Gone quiet</h2><span class="count">${quiet.length}</span></div>
        <div class="panel-body">${quietRows}</div>
      </div>
      <div class="panel span">
        <div class="panel-head"><div class="ph-ic" style="background:var(--teal-wash)">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="#1C7D6D" stroke-width="1.7"><path d="M2 8h3l2-4 2 8 2-4h3"/></svg></div>
          <h2>Latest activity</h2><span class="count">live</span></div>
        <div class="panel-body">${recentRows}</div>
      </div>
    </div>
    ${triageNoise.length?`<div style="margin-top:18px;font-size:12px;color:var(--ink-faint);display:flex;align-items:center;gap:8px">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 4h10l-1 9H4L3 4zM6 4V2.5h4V4"/></svg>
      ${triageNoise.length} emails filtered as noise. Hidden, not deleted.</div>`:''}
  </div>`;
}
function feedRow(d,kind){
  const days = daysSince(d.last);
  const right = kind==='review' ? `<span class="fix-tag fix-review">Review</span>` : `<span class="age" style="color:${heatColor(days)}">${days}d</span>`;
  const meta = kind==='review' ? sourceLine(d,false) : `${fmtUnits(d)} · ${shortSource(d)} · last touch ${fmtDate(d.last)}`;
  return `<div class="row" data-deal="${d.id}">
    ${kind==='quiet'?`<div class="heat" style="background:${heatColor(days)}"></div>`:''}
    <div class="rmain"><div class="rname">${d.name} ${flameFor(d.id)}</div><div class="rmeta">${meta}</div></div>
    ${kind==='quiet'?avatar(d.assignee,'sm'):''}<div class="rtag">${right}</div></div>`;
}
function triageRow(t){ return `<div class="row" data-triage="${t.id}">
    <div class="rmain"><div class="rname">${t.subj}</div><div class="rmeta">${t.from} · ${t.snip}</div></div>
    <div class="rtag"><span class="fix-tag fix-triage">Triage</span></div></div>`; }

/* Priority */
function renderPriority(){
  const ranked = RANK.map(dealById).filter(d=>d&&!d.killed);
  const unranked = live().filter(d=>!RANK.includes(d.id));
  const rows = ranked.map((d,i)=>{
    const meta = RANKMETA[d.id]||{};
    return `<div class="pri-item" draggable="true" data-deal="${d.id}">
      <svg class="pri-grip" width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><circle cx="5" cy="3" r="1.3"/><circle cx="11" cy="3" r="1.3"/><circle cx="5" cy="8" r="1.3"/><circle cx="11" cy="8" r="1.3"/><circle cx="5" cy="13" r="1.3"/><circle cx="11" cy="13" r="1.3"/></svg>
      <div class="rank-badge">${i+1}</div>
      <div class="pri-main">
        <div class="pri-name">${d.name} ${stageChip(d.stage)}</div>
        <div class="pri-by">${shortSource(d)} · ranked by ${meta.by||'—'}${meta.at?' · '+fmtDate(meta.at):''}</div>
      </div>
      ${avatar(d.assignee,'sm')}
      <button class="pri-remove" title="Remove from ranking" onclick="event.stopPropagation();unrank('${d.id}')">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M3.5 3.5l9 9M12.5 3.5l-9 9"/></svg></button>
    </div>`;
  }).join('') || `<div class="empty">Nothing ranked yet. Add deals from the right to start the priority list.</div>`;

  const tray = unranked.map(d=>`<div class="tray-item" onclick="addRank('${d.id}')">
      ${avatar(d.assignee,'sm')}<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${d.name}</span><span class="plus">+</span></div>`).join('')
    || `<div class="empty">Every live deal is ranked.</div>`;

  return `<div class="fade-in">
    <div class="eyebrow">Team priority</div>
    <h1 class="page">The priority list</h1>
    <div class="sub">Drag deals into the order the team should work them, most urgent at the top. Each one shows who placed it last, so the order always has a name behind it. The top three surface on the Feed.</div>
    <div class="pri-wrap">
      <div class="pri-list" id="priList">${rows}</div>
      <div class="pri-tray">
        <div class="tray-head">Not yet ranked</div>
        ${tray}
      </div>
    </div>
  </div>`;
}
function addRank(id){ if(!RANK.includes(id)) RANK.push(id); RANKMETA[id]={by:ME,at:'2026-06-24'}; render(); toast(`Added to priority by ${ME}`); }
function unrank(id){ RANK=RANK.filter(x=>x!==id); delete RANKMETA[id]; render(); toast('Removed from priority'); }

/* Board */
function renderBoard(){
  const cols = STAGES.map(s=>{
    const items = live().filter(d=>d.stage===s.id && matchQ(d)).sort((a,b)=>new Date(b.last)-new Date(a.last));
    const cards = items.map(boardCard).join('') || `<div style="padding:14px;text-align:center;color:var(--ink-faint);font-size:12px">—</div>`;
    return `<div class="col" data-stage="${s.id}"><div class="col-head"><span class="sd" style="background:${s.tint}"></span><span class="cl">${s.label}</span><span class="cc">${items.length}</span></div>
      <div class="col-body" data-stage="${s.id}">${cards}</div></div>`;
  }).join('');
  const killed = killedDeals().filter(matchQ);
  const killCards = killed.map(d=>`<div class="kcard" data-deal="${d.id}"><div class="kname">${d.name}</div>
      <div class="kreason">${d.killReason}</div>
      <div style="margin-top:8px;font-size:11px;color:var(--ink-faint);font-family:'IBM Plex Mono',monospace">Killed ${fmtDate(d.killedDate)} · ${d.killedBy}</div></div>`).join('');
  return `<div class="fade-in">
    <div class="eyebrow">By stage</div><h1 class="page">The board</h1>
    <div class="sub">Drag a deal to move its stage. The classifier sets stage automatically from emails, this is for when you know better.</div>
    <div class="board">${cols}</div>
    <div class="killbar ${state.killbarOpen?'open':''}" id="killbar">
      <div class="killbar-head" onclick="state.killbarOpen=!state.killbarOpen;render()">
        <span class="sd"></span><h3>Killed deals</h3><span class="cc">${killed.length}</span>
        <svg class="chev" width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M4 6l4 4 4-4"/></svg></div>
      <div class="killbar-body">${killCards||'<div class="empty">No killed deals yet.</div>'}</div>
    </div></div>`;
}
function boardCard(d){
  const days = daysSince(d.last);
  return `<div class="card" draggable="true" data-deal="${d.id}">
    <div class="cname">${flameFor(d.id)}${d.name}</div>
    <div class="cmeta">${fmtUnits(d)}${d.cap?' · '+d.cap.toFixed(2)+'% cap':''}</div>
    <div class="crow">${avatar(d.assignee,'sm')}<span class="cbroker">${shortSource(d)}</span>
      <span class="quiet" style="color:${heatColor(days)}"><span class="heat" style="background:${heatColor(days)}"></span>${days}d</span></div></div>`;
}

/* Table */
function renderTable(){
  const cols=[{k:'name',l:'Deal'},{k:'stage',l:'Stage'},{k:'acls',l:'Type'},{k:'units',l:'Units',num:true},{k:'cap',l:'Cap',num:true},{k:'broker',l:'Broker / source'},{k:'assignee',l:'Owner'},{k:'last',l:'Last touch',num:true}];
  let rows = DEALS.filter(matchQ);
  const k=state.sortKey, dir=state.sortDir;
  rows.sort((a,b)=>{ let va=a[k],vb=b[k]; if(k==='last'){va=new Date(a.last);vb=new Date(b.last);} if(k==='broker'){va=shortSource(a);vb=shortSource(b);} if(va<vb)return -dir; if(va>vb)return dir; return 0; });
  const head = cols.map(c=>`<th data-sort="${c.k}">${c.l}${state.sortKey===c.k?`<span class="ar">${dir>0?'▲':'▼'}</span>`:''}</th>`).join('');
  const body = rows.map(d=>{ const days=daysSince(d.last);
    return `<tr data-deal="${d.id}" class="${d.killed?'killed-row':''}">
      <td><span class="tname">${flameFor(d.id)}${d.name}</span></td>
      <td>${d.killed?`<span class="stage-chip" style="background:var(--rust-wash);color:var(--rust)"><span class="sd" style="background:var(--rust)"></span>Killed</span>`:stageChip(d.stage)}</td>
      <td style="text-transform:capitalize;color:var(--ink-soft)">${d.acls}</td>
      <td class="num">${d.units||'—'}</td>
      <td class="num">${d.cap?d.cap.toFixed(2):'—'}</td>
      <td>${d.broker?d.broker:`<span style="color:var(--amber)">${(d.source||{}).label||'—'}</span>`}</td>
      <td>${d.assignee?`<div style="display:flex;align-items:center;gap:7px">${avatar(d.assignee,'sm')}${d.assignee}</div>`:'<span style="color:var(--ink-faint)">Unassigned</span>'}</td>
      <td class="num" style="color:${d.killed?'var(--ink-faint)':heatColor(days)}">${d.killed?fmtDate(d.killedDate):days+'d'}</td></tr>`;
  }).join('');
  return `<div class="fade-in"><div class="eyebrow">Everything</div><h1 class="page">The book</h1>
    <div class="sub">Every deal, live and killed. Click a column to sort. This is the Excel replacement, except it updates itself.</div>
    <div class="tbl-wrap"><table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table></div></div>`;
}

/* Drawer */
function openDeal(id){
  const d=dealById(id); if(!d) return;
  const dr=$('#drawer'); dr.className='drawer show'+(d.killed?' killed':''); $('#scrim').classList.add('show');
  const figs=[d.units?`<span class="fig"><b>${d.units}</b> units</span>`:'',d.cap?`<span class="fig"><b>${d.cap.toFixed(2)}%</b> cap</span>`:'',d.year?`<span class="fig">built <b>${d.year}</b></span>`:'',d.address?`<span class="fig">${d.address}</span>`:'',`<span class="fig" style="text-transform:capitalize">${d.acls}</span>`].filter(Boolean).join('');

  const r = rankOf(id);
  const priLine = r ? `<span style="font-size:13px;color:var(--flame);font-weight:600;display:inline-flex;align-items:center;gap:5px"><svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1c1.6 2.3 3.2 3.4 3.2 5.6A3.2 3.2 0 018 9.8a3.2 3.2 0 01-3.2-3.2c0-1 .5-1.9 1-2.6C7 5 8 4 8 1z"/></svg>Priority #${r} · ${(RANKMETA[id]||{}).by||''}</span>` : '';

  const stageTrack = d.killed?'':`<div class="d-sec"><div class="lbl">Stage <span class="ln"></span></div>
    <div class="stage-track">${STAGES.map(s=>`<button class="st ${d.stage>=s.id?'done':''}" style="${d.stage>=s.id?`background:${s.tint};border-color:${s.tint}`:''}" onclick="setStage('${d.id}',${s.id})"><span class="stn">0${s.id}</span>${s.label}</button>`).join('')}</div></div>`;

  const assignSec = `<div class="d-sec"><div class="lbl">Owner <span class="ln"></span></div>
    <div class="assign-row">${Object.keys(PEOPLE).map(p=>`<button class="person-pick ${d.assignee===p?'on':''}" onclick="assign('${d.id}','${p}')">${avatar(p,'sm')}${p}</button>`).join('')}</div></div>`;

  const UW_SKIP={'Property Name':1,'Property Address':1,'Broker Company':1,'Broker Name':1,'Status':1};
  const uwRows = d.pipeVals ? PIPE.cols.map((c,i)=>({l:c.l,t:c.t,v:d.pipeVals[i]})).filter(x=>x.v!==''&&x.v!=null&&!UW_SKIP[x.l]) : [];
  const uwSec = uwRows.length ? `<div class="d-sec"><div class="lbl">Underwriting detail <span class="ln"></span><span style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-faint)">${uwRows.length} fields</span></div>
    <div class="uw-grid">${uwRows.map(x=>`<div class="uw-cell"><div class="uw-l">${x.l}</div><div class="uw-v">${fmtPipe(x.v,x.t)||'—'}</div></div>`).join('')}</div>
    <div style="font-size:11.5px;color:var(--ink-faint);margin-top:8px">These are the pipeline columns from your Excel. Same fields a new deal carries, ready to fill.</div></div>` : '';
  const mails=[...d.emails].sort((a,b)=>new Date(a.date)-new Date(b.date));
  const thread = `<div class="d-sec"><div class="lbl">All emails about this deal <span class="ln"></span><span style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-faint)">${mails.length} · across inboxes</span></div>
    <div>${mails.map(m=>`<div class="mail"><div class="mail-top"><span class="mail-from">${m.from}</span>
      <span class="mtag ${m.tag}">${m.tag==='auto'?'matched':m.tag}</span>
      <span class="inbox-chip">${m.inbox||'—'}</span><span class="mail-date">${fmtDate(m.date)}</span></div>
      <div class="mail-subj">${m.subj}</div><div class="mail-snip">${m.snip}</div></div>`).join('')}</div></div>`;

  const files = d.files||[];
  const fileList = files.map((f,i)=>`<div class="file-item"><span class="file-ic ${f.kind}">${fileGlyph(f.kind)}</span>
      <div style="flex:1;min-width:0"><div class="file-name">${f.name}</div><div class="file-meta">${f.size} · ${f.kind.toUpperCase()}</div></div>
      <button class="file-del" title="Remove" onclick="removeFile('${d.id}',${i})"><svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M3.5 3.5l9 9M12.5 3.5l-9 9"/></svg></button></div>`).join('');
  const attachSec = `<div class="d-sec"><div class="lbl">Files <span class="ln"></span><span style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-faint)">${files.length}</span></div>
    ${fileList}
    <label class="dropzone"><input type="file" multiple style="display:none" onchange="addFiles('${d.id}',this.files)">
      <svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 11V3M5 6l3-3 3 3"/><path d="M2.5 11v1.5a1 1 0 001 1h9a1 1 0 001-1V11"/></svg>
      <span>Attach the T-12, OM, rent roll, financials…</span></label></div>`;

  const notes = `<div class="d-sec"><div class="lbl">Notes <span class="ln"></span></div>
    ${d.notes.map((n,i)=>`<div class="note ${n.who===ME?'me':'them'} ${n.done?'done':''}">
      <div class="note-top">${avatar(n.who,'sm')}<span class="note-who">${n.who}</span><span class="note-date">${fmtDate(n.date)}</span>
        <button class="note-check" title="${n.done?'Mark not done':'Mark done'}" onclick="toggleNote('${d.id}',${i})">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M3 8.5l3.5 3.5L13 4.5"/></svg></button></div>
      <div class="note-text">${n.text}</div></div>`).join('')}
    <div class="note-add"><textarea id="noteInput" placeholder="Add a note. It is posted under your name…" rows="1"></textarea>
      <button class="btn btn-primary" onclick="addNote('${d.id}')">Post</button></div></div>`;

  const killBlock = d.killed?`<div class="d-sec"><div class="killnote"><b>Killed ${fmtDate(d.killedDate)} by ${d.killedBy}.</b><br>${d.killReason}</div></div>`:'';

  dr.innerHTML=`<div class="d-head"><div class="d-top"><div class="d-name">${d.name}</div>
      <button class="d-close" onclick="closeDrawer()"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M3.5 3.5l9 9M12.5 3.5l-9 9"/></svg></button></div>
      <div style="margin-top:8px;display:flex;align-items:center;gap:12px;flex-wrap:wrap">
        <span style="font-size:13px;color:var(--ink-soft)">${sourceLine(d)}</span>${priLine}
        ${d.review?`<span class="fix-tag fix-review">Needs review</span>`:''}</div>
      <div class="d-figs">${figs}</div></div>
    <div class="d-body">${killBlock}${stageTrack}${assignSec}${uwSec}${thread}${attachSec}${notes}</div>
    <div class="d-foot">
      ${d.killed
        ? `<button class="btn btn-ghost" onclick="restore('${d.id}')">↩ Restore to pipeline</button><span style="font-size:12px;color:var(--ink-faint);margin-left:auto">Record kept permanently</span>`

function brokerIndex(){

    if(!map[name]) map[name]={name,firm:d.firm||'',deals:[],lastEmail:null,lastSubj:'',lastSnip:'',lastFrom:''};
    const b=map[name]; b.deals.push(d); if(!b.firm&&d.firm) b.firm=d.firm;
    d.emails.forEach(m=>{ if(m.imported) return; if(!b.lastEmail||new Date(m.date)>new Date(b.lastEmail)){ b.lastEmail=m.date; b.lastSubj=m.subj; b.lastSnip=m.snip; b.lastFrom=m.from; } });
  });
  Object.values(map).forEach(b=>{ b.lastTouch=b.lastEmail; (BROKER_LOG[b.name]||[]).forEach(e=>{ if(!b.lastTouch||new Date(e.date)>new Date(b.lastTouch)) b.lastTouch=e.date; }); });

/* ===== Pipeline view (exact Excel columns) ===== */
function fmtPipe(val,type){
  if(val===''||val===null||val===undefined) return '';
  if(type==='money'){ const n=Number(val); return isNaN(n)?val:'$'+Math.round(n).toLocaleString(); }
  if(type==='pct'){ const n=Number(val); if(isNaN(n))return val; const p=Math.abs(n)<1.5?n*100:n; return p.toFixed(1)+'%'; }
  if(type==='num2'){ const n=Number(val); return isNaN(n)?val:n.toFixed(2); }
  if(type==='year'){ return String(val); }
  if(type==='date'){ try{return fmtDate(val);}catch(e){return val;} }
  return String(val);
}
function dealToPipeRow(d){
  if(d.pipeVals) return d.pipeVals;
  const v=new Array(PIPE.cols.length).fill('');
  const set=(key,val)=>{ const i=PIPE.cols.findIndex(c=>c.l===key); if(i>=0) v[i]=val; };
  set('Property Name',d.name); set('Property Address',d.address); set('Broker Company',d.firm);
  set('Broker Name',d.broker); set('# of Units',d.units||''); set('Year Built',d.year||'');
  set('Status', d.killed?'Dead':'Live'); set('UW', d.assignee||''); set('Metro','DFW');
  set('Trailing Going In Cap Rate (T3R/T12E T&I Adj.)', d.cap?(d.cap/100):'');
  return v;
}
function renderPipeView(){
  const cols=PIPE.cols;
  const statusIdx=cols.findIndex(c=>c.l==='Status');
  const nameIdx=cols.findIndex(c=>c.l==='Property Name');
  const deals=DEALS.filter(matchQ).sort((a,b)=>{const ka=a.killed?1:0,kb=b.killed?1:0; if(ka!==kb)return ka-kb; return (a.pn||9999)-(b.pn||9999);});
  const liveN=deals.filter(d=>!d.killed).length;
  const head='<th>#</th>'+cols.map((c,i)=>`<th class="${i===nameIdx?'pp-sticky':''}">${c.l}</th>`).join('');
  const body=deals.map(d=>{
    const row=dealToPipeRow(d);
    const cells=cols.map((c,i)=>{
      if(i===statusIdx){ const dead=d.killed;
        return `<td><span class="pp-stat ${dead?'dead':'live'}">${dead?'Dead':(row[i]||'Live')}</span><button class="pp-kill" onclick="event.stopPropagation();${dead?`pipeRestore('${d.id}')`:`openKill('${d.id}')`}">${dead?'Restore':'Kill'}</button></td>`;
      }
      const val=fmtPipe(row[i], c.t);
      const cls=((c.t==='money'||c.t==='pct'||c.t==='num2')?'num ':'')+(i===nameIdx?'pp-sticky pp-name':'');
      return `<td class="${cls}">${val}</td>`;
    }).join('');
    return `<tr data-deal="${d.id}" class="${d.killed?'killed-row':''}"><td class="pp-num">${d.pn||'—'}</td>${cells}</tr>`;
  }).join('');
  return `<div class="fade-in"><div class="eyebrow">The familiar view</div><h1 class="page">Pipeline</h1>
    <div class="sub">Your acquisition pipeline in the same columns and layout the team already knows, now live and self-updating. ${liveN} active, ${deals.length-liveN} archived. Scroll right for the full underwriting detail. Kill or restore from the Status column. Click any row to open the deal.</div>
    <div class="pp-wrap"><table class="pp-table"><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table></div></div>`;
}
function pipeRestore(id){ const d=dealById(id); d.killed=false; delete d.killReason; render(); toast(d.name+' restored to active'); }

function fileGlyph(kind){ return ({pdf:'PDF',xlsx:'XLS',t12:'T-12',om:'OM',rr:'RR',img:'IMG'}[kind]||'DOC'); }
function guessKind(name){ const n=name.toLowerCase();
  if(n.includes('t-12')||n.includes('t12')) return 't12';
  if(n.includes('offering')||/\bom\b/.test(n)) return 'om';
  if(n.includes('rent')&&n.includes('roll')) return 'rr';
  if(n.endsWith('.xlsx')||n.endsWith('.xls')||n.endsWith('.csv')) return 'xlsx';
  if(n.endsWith('.pdf')) return 'pdf';
  if(/\.(png|jpg|jpeg|gif|webp)$/.test(n)) return 'img';
  return 'doc'; }
function fmtSize(b){ if(b<1024)return b+' B'; if(b<1048576)return (b/1024).toFixed(0)+' KB'; return (b/1048576).toFixed(1)+' MB'; }
function addFiles(id,fileList){ const d=dealById(id); Array.from(fileList).forEach(f=>{ d.files.push({name:f.name,size:fmtSize(f.size),kind:guessKind(f.name)}); }); d.last='2026-06-24'; openDeal(id); const k=fileList.length; toast(k+' file'+(k>1?'s':'')+' attached'); }

const ME_KEY = 'leone_me';
function currentUser(){ try{ return localStorage.getItem(ME_KEY) || ME; }catch(e){ return ME; } }

async function bootLive(){
  ensureClient();
  if(!sb){
    // library may not have loaded yet; wait briefly and retry once
    await new Promise(r=>setTimeout(r,600));
    ensureClient();
  }
  if(!sb){ toast('Could not reach the database library. Check your connection and refresh.'); return; }
  try{
    // pull deals with joined broker
    const { data: deals, error: de } = await sb
      .from('deals')
      .select('id,name,asset_class,units,address,year_built,cap_rate,stage_auto,stage_manual,assigned_name,needs_review,status,kill_reason,killed_at,latest_email_at,updated_at,merged_into,broker_id,brokers(name,firm)')
      .is('merged_into', null);
    if(de) throw de;

    const mapped = (deals||[]).map(mapDbDeal);

    // notes
    const { data: notes } = await sb.from('team_notes').select('deal_id,author_name,body,created_at,tag');
    const notesByDeal = {};
    (notes||[]).forEach(n=>{ (notesByDeal[n.deal_id]=notesByDeal[n.deal_id]||[]).push(
      { who:n.author_name||'Team', date:(n.created_at?String(n.created_at).slice(0,10):''), text:n.body||'', done:false }); });

    // emails
    const { data: emails } = await sb.from('deal_emails').select('deal_id,subject,from_name,received_at,source_mailbox,match_status');
    const emailsByDeal = {};
    (emails||[]).forEach(e=>{ if(!e.deal_id) return; (emailsByDeal[e.deal_id]=emailsByDeal[e.deal_id]||[]).push(
      { from:e.from_name||'', subj:e.subject||'', date:(e.received_at?String(e.received_at).slice(0,10):''),
        tag:e.match_status||'auto', inbox:e.source_mailbox||'', snip:'' }); });

    mapped.forEach(d=>{ d.notes = notesByDeal[d.id]||[]; d.emails = emailsByDeal[d.id]||[]; });

    // rank
    const { data: ranks } = await sb.from('deal_rank').select('deal_id,position').order('position',{ascending:true});
    RANK = (ranks||[]).map(r=>r.deal_id).filter(id=>mapped.some(d=>d.id===id));

    DEALS.length = 0; mapped.forEach(d=>DEALS.push(d));
    render();
    toast('Loaded '+mapped.length+' deals');
  }catch(e){ console.error(e); toast('Load failed: '+(e.message||e)); }
}

// ---- write-through helpers (optimistic local update, then persist) ----
async function _dbUpdateDeal(id, patch){
  if(!sb) return;
  const { error } = await sb.from('deals').update(patch).eq('id', id);
  if(error){ console.error(error); toast('Save failed: '+error.message); }
}

setStage = function(id,s){ const d=dealById(id); if(!d) return; d.stage=s; toast(d.name+' moved to '+stageMeta(s).label); openDeal(id); render(); _dbUpdateDeal(id,{stage_manual:s}); };
assign = function(id,p){ const d=dealById(id); if(!d) return; d.assignee=(d.assignee===p?'':p); toast(d.assignee?(d.name+' assigned to '+p):(d.name+' unassigned')); openDeal(id); render(); _dbUpdateDeal(id,{assigned_name:d.assignee||null}); };
confirmReview = function(id){ const d=dealById(id); if(!d) return; d.review=false; toast(d.name+' confirmed as a deal'); openDeal(id); render(); _dbUpdateDeal(id,{needs_review:false}); };
restore = function(id){ const d=dealById(id); if(!d) return; d.killed=false; d.killReason=''; toast(d.name+' restored'); openDeal(id); render(); _dbUpdateDeal(id,{status:'active',kill_reason:null,killed_at:null}); };
pipeRestore = restore;

confirmKill = function(){ const d=dealById(killTarget); if(!d) return; const custom=$('#killCustom').value.trim(); const reason=custom||$('#killCustom').dataset.picked; if(!reason){toast('Pick or write a reason first');return;} const me=currentUser(); d.killed=true; d.killReason=reason; d.killedBy=me; d.killedDate=new Date().toISOString().slice(0,10); RANK=RANK.filter(x=>x!==d.id); closeKill(); closeDrawer(); render(); toast(d.name+' killed. Record kept.'); _dbUpdateDeal(d.id,{status:'dead',kill_reason:reason,killed_at:new Date().toISOString()}); if(sb) sb.from('deal_rank').delete().eq('deal_id',d.id); };

addNote = async function(id){ const d=dealById(id); if(!d) return; const ta=$('#noteInput'); const v=ta.value.trim(); if(!v) return; const me=currentUser(); const today=new Date().toISOString().slice(0,10); d.notes.push({who:me,date:today,text:v,done:false}); openDeal(id); render(); toast('Note posted by '+me); if(sb){ const {error}=await sb.from('team_notes').insert({deal_id:id,author_name:me,body:v}); if(error){console.error(error);toast('Note save failed: '+error.message);} } };

// rank persistence
async function _saveRank(){ if(!sb) return; try{ await sb.from('deal_rank').delete().neq('deal_id','00000000-0000-0000-0000-000000000000'); const rows=RANK.map((id,i)=>({deal_id:id,position:i,ranked_by:currentUser()})); if(rows.length) await sb.from('deal_rank').insert(rows); }catch(e){ console.error(e); } }
addRank = function(id){ if(!RANK.includes(id)){ RANK.push(id); } render(); toast('Added to priority'); _saveRank(); };
unrank = function(id){ RANK=RANK.filter(x=>x!==id); render(); toast('Removed from priority'); _saveRank(); };

// auto-skip gate if cookie present
(function(){ try{ if(document.cookie.indexOf('leone_ok=1')>-1){ const g=document.getElementById('pwGate'); if(g) g.style.display='none'; bootLive(); } }catch(e){} })();

// initial render (gate covers screen until password / cookie)
render();
</script>
